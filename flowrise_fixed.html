<script>
(function(){
  const sidebar = document.querySelector('[data-sidebar]') || document.querySelector('.sidebar');
  const overlay = document.querySelector('.overlay') || document.querySelector('[data-overlay]');
  const body = document.body;

  function closeSidebar(){
    if(!sidebar) return;
    sidebar.classList.remove('open');
    body.style.overflow = '';
    if(overlay) overlay.style.display = 'none';
  }

  function openSidebar(){
    if(!sidebar) return;
    sidebar.classList.add('open');
    body.style.overflow = 'hidden';
    if(overlay) overlay.style.display = 'block';
  }

  document.addEventListener('click', function(e){
    const t = e.target;

    if(t.closest && t.closest('.sidebar-toggle')){
      e.preventDefault();
      const isOpen = sidebar && sidebar.classList.contains('open');
      isOpen ? closeSidebar() : openSidebar();
    }

    if(t.closest && t.closest('.sidebar a')){
      if(window.innerWidth < 768){
        closeSidebar();
      }
    }

    if(t === overlay){
      closeSidebar();
    }
  });

  window.addEventListener('resize', function(){
    if(window.innerWidth >= 768){
      closeSidebar();
    }
  });
})();
</script>
